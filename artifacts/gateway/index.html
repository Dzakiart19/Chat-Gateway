    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      (function () {
        function showError(msg) {
          var el = document.getElementById('root');
          if (el) {
            el.innerHTML =
              '<div style="padding:24px;font-family:system-ui,sans-serif;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;margin:24px;white-space:pre-wrap;word-break:break-all">' +
              '<strong>JS Error (screenshot &amp; report):</strong><br><br>' +
              msg.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
          }
        }
        window.addEventListener('error', function (e) {
          showError((e.message || 'Unknown error') + '\nFile: ' + (e.filename || '') + ' line ' + e.lineno);
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason;
          showError('Unhandled rejection:\n' + (r && r.stack ? r.stack : String(r)));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;color:#6b7280;font-size:14px">
        Loading&hellip;
      </div>
    </div>
